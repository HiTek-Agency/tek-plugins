<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Tek Chrome Control</title>
		<link rel="stylesheet" href="popup.css" />
	</head>
	<body>
		<header>
			<h1>Tek Chrome Control</h1>
		</header>

		<section class="status-row">
			<span id="status-dot" class="dot dot-disconnected" aria-hidden="true"></span>
			<span id="status-text">Not connected — paste token</span>
		</section>

		<section class="versions-row">
			<span>Extension v0.1.0</span>
			<span class="sep">·</span>
			<span>Gateway: <span id="gateway-version">—</span></span>
		</section>

		<section id="token-section" class="token-section">
			<label for="token-input">Paste token from Tek desktop</label>
			<input id="token-input" type="text" placeholder="tek-chrome-…" autocomplete="off" spellcheck="false" />
			<button id="save-token" type="button">Save</button>
		</section>

		<footer>
			<button id="reset-connection" type="button" class="secondary">Reset connection</button>
		</footer>

		<script src="popup.js" type="module"></script>
	</body>
</html>
